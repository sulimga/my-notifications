name: Listing Status Monitor

# Коли запускати:
# 1. "schedule" - автоматично, за розкладом (cron), кожні 5 хвилин.
# 2. "workflow_dispatch" - вручну, кнопкою "Run workflow" на GitHub
#    (зручно для тесту, щоб не чекати розклад).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Завантажити код репозиторію
        uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Встановити залежності
        run: pip install -r requirements.txt

      - name: Запустити перевірку
        env:
          SITE_COOKIE: ${{ secrets.SITE_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_CABINET_URL: ${{ secrets.SITE_CABINET_URL }}
        run: python lun_monitor.py --once

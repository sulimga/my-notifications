name: LUN Representability Monitor

# Коли запускати:
# 1. "schedule" - автоматично, за розкладом (cron), кожні 15 хвилин.
# 2. "workflow_dispatch" - вручну, кнопкою "Run workflow" на GitHub
#    (зручно для тесту, щоб не чекати 15 хвилин).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Завантажити код репозиторію
        uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Встановити залежності
        run: pip install -r requirements.txt

      - name: Запустити перевірку
        env:
          RIELTOR_COOKIE: ${{ secrets.RIELTOR_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lun_monitor.py --once

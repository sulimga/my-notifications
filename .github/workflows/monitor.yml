name: LUN Representability Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Завантажити код репозиторію
        uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Встановити залежності
        run: pip install -r requirements.txt

      - name: Запустити перевірку
        env:
          RIELTOR_COOKIE: ${{ secrets.RIELTOR_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lun_monitor.py --once

      - name: Зберегти оновлений стан назад у репозиторій
        run: |
          git config user.name "lun-monitor-bot"
          git config user.email "actions@github.com"
          git add lun_monitor_state.json
          git diff --quiet --cached || git commit -m "Оновлення стану оголошень"
          git push
